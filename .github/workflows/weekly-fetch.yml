name: weekly-feed-snapshot
on:
  schedule:
    - cron: "30 17 * * 0"   # zondag 17:30 UTC = 19:30 NL (zomertijd), voor de 20:04-run
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install feedparser
      - run: python fetcher.py
      - name: commit snapshot
        run: |
          git config user.name "feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "snapshot $(date -u +%F)"
          git push
